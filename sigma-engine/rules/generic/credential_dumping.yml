title: Credential Dumping Attempt
id: b2d3f4a5-8c9e-0f1b-2c3d-4e5f6a7b8c9d
status: stable
description: Detecta intentos de volcado de credenciales mediante herramientas como Mimikatz, LSASS dump, SAM database access o técnicas de credential harvesting.
references:
  - https://attack.mitre.org/techniques/T1003/
  - https://attack.mitre.org/techniques/T1003/001/
author: AUT_SOC Team
date: 2026-03-17
tags:
  - attack.credential_access
  - attack.T1003
  - attack.T1003.001
  - attack.T1552
logsource:
  category: generic
  product: qradar
level: critical
detection:
  selection_tools:
    EventName|contains:
      - 'Mimikatz'
      - 'Credential Dumping'
      - 'LSASS Access'
      - 'SAM Database'
      - 'sekurlsa'
      - 'lsadump'
      - 'credential harvesting'
  selection_linux:
    EventName|contains:
      - '/etc/shadow'
      - '/etc/passwd access'
      - 'hashdump'
      - 'password hash'
  selection_kerberos:
    EventName|contains:
      - 'Kerberoasting'
      - 'AS-REP Roasting'
      - 'Golden Ticket'
      - 'Silver Ticket'
      - 'DCSync'
  condition: selection_tools or selection_linux or selection_kerberos
falsepositives:
  - Pentesting autorizado
  - Herramientas de gestión de contraseñas corporativas
